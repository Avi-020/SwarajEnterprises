    <!-- Header -->
    <div class="container-fluid bg-dark text-white text-center py-5">
      <h1 class="display-5">Schedule a Meeting</h1>
      <p>Let’s discuss your requirements</p>
    </div>

    <!-- Form Section -->
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="bg-light p-5 rounded shadow">
            <form action="#" method="POST">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Mobile Number</label>
                  <input type="tel" class="form-control" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Preferred Date</label>
                  <input type="date" class="form-control" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Preferred Time</label>
                  <input type="time" class="form-control" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Meeting Type</label>
                  <select class="form-control">
                    <option>Phone Call</option>
                    <option>Video Meeting</option>
                    <option>Visit Factory</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">Message</label>
                  <textarea class="form-control" rows="4"></textarea>
                </div>

                <div class="col-12 text-center">
                  <button class="btn btn-primary px-5 py-3">
                    Schedule Now
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white text-center py-3">
      <small>© Swaraj Enterprises</small>
    </div>
